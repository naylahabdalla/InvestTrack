{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-lg-8">
        <div class="card border-0 shadow-lg p-4 p-md-5 mb-5" style="border-radius:30px;">
            <div class="mb-4">
                <a href="/learn" class="text-decoration-none small fw-bold text-uppercase tracking-wider text-muted">← Back to Hub</a>
            </div>
            
            <h1 class="display-5 fw-bold mb-4 mb-md-5" style="color: #1e293b;">{{ title }}</h1>

            <div class="course-content fs-5 text-secondary lh-lg">
                {{ content | safe }}
            </div>

            <hr class="my-5 opacity-10">

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 bg-light p-4 rounded-4">
                <div>
                    <h6 class="fw-bold mb-1">Knowledge Check</h6>
                    <p class="small text-muted mb-0">Test what you've learned in this module.</p>
                </div>
                <a href="/quiz/{{ title }}" class="btn btn-primary px-5 rounded-pill fw-bold">Start Quiz</a>
            </div>
        </div>
    </div>
</div>

<style>
.course-content h5 {
    color: #3b82f6;
    font-weight: 800;
    margin-top: 2rem;
    margin-bottom: 1rem;
}
.course-content ul {
    border-left: 4px solid #e2e8f0;
    padding-left: 2rem;
    list-style: none;
}
.course-content li {
    margin-bottom: 1rem;
    position: relative;
}
.course-content li::before {
    content: "•";
    color: #3b82f6;
    font-weight: bold;
    display: inline-block;
    width: 1em;
    margin-left: -1em;
}
</style>

{% endblock %}
