{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2 class="mb-4 fw-bold">📊 Investment Portfolio</h2>

    <!-- KPI CARD -->
    <div class="card shadow-sm p-4 mb-4" style="border-radius:15px;">
        <h6 class="text-muted">Total Invested</h6>
        <h2 class="fw-bold">${{ total }}</h2>
    </div>

    <!-- ADD BUTTON -->
    <div class="mb-4">
        <a href="/add" class="btn btn-primary w-100 py-2 fw-semibold" style="border-radius:10px;">
            + Add Investment
        </a>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm p-3" style="border-radius:15px;">
        <h5 class="mb-3">Your Investments</h5>

        <table class="table align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Asset</th>
                    <th>Type</th>
                    <th>Amount ($)</th>
                    <th class="text-end">Action</th>
                </tr>
            </thead>

            <tbody>
                {% for inv in investments %}
                <tr>
                    <td>{{ inv[0] }}</td>
                    <td class="fw-semibold">{{ inv[1] }}</td>
                    <td>
                        <span class="badge bg-secondary">{{ inv[2] }}</span>
                    </td>
                    <td>${{ inv[3] }}</td>
                    <td class="text-end">
                        <a href="/delete/{{ inv[0] }}" class="btn btn-sm btn-danger">
                            Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

{% endblock %}
