<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify 2FA - InvestTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #141e30, #243b55); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .verify-card { background: white; color: #333; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
        .token-input { letter-spacing: 0.5rem; font-size: 2rem; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="verify-card">
        <h2 class="fw-bold mb-3">Two-Step Verification</h2>
        <p class="text-muted mb-4">Enter the 6-digit verification code from your authenticator app to continue.</p>
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-4">
                <input type="text" name="token" class="form-control form-control-lg text-center token-input" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus autocomplete="one-time-code">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill shadow-sm">Verify Code</button>
            <p class="mt-4 small text-muted">
                Lost access? <a href="/signup" class="text-decoration-none">Contact Support</a>
            </p>
        </form>
    </div>
</body>
</html>
