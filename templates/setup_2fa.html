<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Up 2FA - InvestTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #141e30, #243b55); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .setup-card { background: white; color: #333; border-radius: 20px; padding: 40px; width: 100%; max-width: 500px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
        #qrcode { display: inline-block; margin: 20px 0; padding: 10px; background: white; border: 1px solid #ddd; }
        .secret-box { background: #f8f9fa; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 1.1rem; margin-bottom: 20px; border: 1px dashed #ccc; }
    </style>
</head>
<body>
    <div class="setup-card">
        <h2 class="fw-bold mb-3">Secure Your Account</h2>
        <p class="text-muted">Scan the QR code below with an authenticator app (like Google Authenticator or Authy) to set up two-factor authentication.</p>
        
        <div id="qrcode"></div>
        
        <p class="small text-muted mb-1">Or enter this code manually:</p>
        <div class="secret-box">{{ secret }}</div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Enter 6-digit code from app</label>
                <input type="text" name="token" class="form-control form-control-lg text-center" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill">Verify & Finish Setup</button>
        </form>
    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "{{ uri }}",
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
