{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 p-4 mt-5">
            <h2 class="mb-4 fw-bold text-center">📈 Add New Investment</h2>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Asset Name</label>
                    <input type="text" name="asset_name" class="form-control rounded-pill px-3" placeholder="e.g. Apple, Bitcoin, Gold" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Asset Type</label>
                    <select name="asset_type" class="form-select rounded-pill px-3">
                        <option value="Stock">Stock</option>
                        <option value="Cryptocurrency">Cryptocurrency</option>
                        <option value="ETF">ETF</option>
                        <option value="Commodity">Commodity</option>
                        <option value="Real Estate">Real Estate</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Amount Invested ($)</label>
                    <input type="number" step="0.01" name="amount" class="form-control rounded-pill px-3" placeholder="0.00" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold d-block">Status</label>
                    <div class="btn-group w-100 shadow-sm" role="group">
                        <input type="radio" class="btn-check" name="status" id="statusActive" value="Active" autocomplete="off" checked>
                        <label class="btn btn-outline-primary py-2 fw-semibold" for="statusActive">📈 I still own this asset</label>

                        <input type="radio" class="btn-check" name="status" id="statusSold" value="Sold" autocomplete="off">
                        <label class="btn btn-outline-primary py-2 fw-semibold" for="statusSold">🛒 I sold this asset</label>
                    </div>
                </div>

                <div id="activeFields" class="mb-3">
                    <label class="form-label fw-semibold">Current Market Value ($)</label>
                    <input type="number" step="0.01" name="current_value" class="form-control rounded-pill px-3" placeholder="Leave blank for break-even">
                    <div class="form-text text-muted ps-2">Show unrealized gains/losses.</div>
                </div>

                <div id="soldFields" class="mb-3 d-none">
                    <label class="form-label fw-semibold">Sell Price ($)</label>
                    <input type="number" step="0.01" name="sell_price" class="form-control rounded-pill px-3" placeholder="0.00">
                    <div class="form-text text-muted ps-2">Show realized gains/losses.</div>
                </div>

                <div class="mt-4">
                    {% if session.get('is_demo') %}
                    <button type="submit" class="btn btn-secondary w-100 rounded-pill py-2 disabled" title="Disabled in Demo">
                        Add Investment (Disabled in Demo)
                    </button>
                    {% else %}
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">
                        Add Investment
                    </button>
                    {% endif %}
                </div>
            </form>

            <div class="mt-3 text-center">
                <a href="/portfolio" class="text-decoration-none fw-semibold">← Back to Portfolio</a>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelectorAll('input[name="status"]').forEach((elem) => {
    elem.addEventListener("change", function(event) {
        const status = event.target.value;
        const activeFields = document.getElementById('activeFields');
        const soldFields = document.getElementById('soldFields');
        
        if (status === 'Sold') {
            activeFields.classList.add('d-none');
            soldFields.classList.remove('d-none');
        } else {
            activeFields.classList.remove('d-none');
            soldFields.classList.add('d-none');
        }
    });
});
</script>

{% endblock %}
