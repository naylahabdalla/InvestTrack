<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg,#141e30,#243b55);">

    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg p-4" style="width: 400px; max-width: 90%; border-radius: 15px;">

            <h3 class="text-center mb-3">Create Account</h3>
            <p class="text-center text-muted">Start your investment journey</p>

            {% if error %}
            <div class="alert alert-danger text-center">{{ error }}</div>
            {% endif %}

            <form method="POST">

                <div class="mb-3">
                    <input type="text" name="username" class="form-control" placeholder="Username" required>
                </div>

                <div class="mb-3">
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                    <small class="text-muted">
                        Must be 8+ characters, include letters, numbers & symbols
                    </small>
                </div>

                <div class="mb-3">
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password"
                        required>
                </div>

                <div class="mb-3 form-check text-start">
                    <input type="checkbox" name="consent" class="form-check-input" id="consentCheck" required>
                    <label class="form-check-label text-muted" for="consentCheck" style="font-size: 0.85em;">
                        I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>
                    </label>
                </div>

                <button class="btn btn-primary w-100">Sign Up</button>

            </form>

            <p class="text-center mt-3">
                Already have an account? <a href="/login">Login</a>
            </p>

        </div>
    </div>

</body>

</html>
