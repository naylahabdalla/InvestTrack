<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestTrack - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(circle at 85% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 15% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.6s ease-out;
        }
        .brand {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            text-align: center;
        }
        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            color: #fff;
        }
        .form-control::placeholder {
            color: #64748b;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        .text-muted {
            color: #94a3b8 !important;
        }
        a {
            color: #a5b4fc;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        a:hover {
            color: #c7d2fe;
            text-decoration: underline;
        }
        .form-check-input {
            background-color: rgba(15, 23, 42, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .form-check-input:checked {
            background-color: #6366f1;
            border-color: #6366f1;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="auth-card">
            <div class="brand">
                <i class="bi bi-graph-up-arrow me-2" style="color: #a5b4fc;"></i>InvestTrack
            </div>
            <h4 class="fw-bold text-center mb-1">Create Account</h4>
            <p class="text-center text-muted mb-4">Start your investment journey today</p>

            {% if error %}
            <div class="alert alert-danger text-center bg-danger bg-opacity-10 text-danger border-danger border-opacity-25 rounded-3">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="signupPassword" class="form-control border-end-0" placeholder="Create a password" required>
                        <button class="btn btn-outline-secondary border-start-0 toggle-password" type="button" onclick="togglePassword('signupPassword', this)" style="background: rgba(15, 23, 42, 0.6); border-color: rgba(255, 255, 255, 0.1); color: #94a3b8;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <div class="form-text text-muted" style="font-size: 0.75rem; margin-top: 6px;">
                        Must be 8+ characters, include letters, numbers & symbols
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" name="confirm_password" id="signupConfirmPassword" class="form-control border-end-0" placeholder="Confirm your password" required>
                        <button class="btn btn-outline-secondary border-start-0 toggle-password" type="button" onclick="togglePassword('signupConfirmPassword', this)" style="background: rgba(15, 23, 42, 0.6); border-color: rgba(255, 255, 255, 0.1); color: #94a3b8;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" name="consent" class="form-check-input" id="consentCheck" required>
                    <label class="form-check-label text-muted" for="consentCheck" style="font-size: 0.8rem;">
                        I agree to the <a href="/terms" target="_blank" class="fw-semibold">Terms of Service</a> and <a href="/privacy" target="_blank" class="fw-semibold">Privacy Policy</a>
                    </label>
                </div>

                <button class="btn btn-primary w-100 mb-3">Sign Up</button>
            </form>

            <p class="text-center small mb-0">
                Already have an account? <a href="/login" class="fw-semibold">Log in</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword(fieldId, btn) {
            const field = document.getElementById(fieldId);
            const icon = btn.querySelector('i');
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }
    </script>
    
    <!-- Focus ring fix for input groups and Mobile padding -->
    <style>
        .input-group:focus-within .form-control,
        .input-group:focus-within .btn {
            border-color: #6366f1 !important;
            box-shadow: none;
        }
        .input-group:focus-within {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            border-radius: 12px;
        }
        .input-group .form-control:focus {
            box-shadow: none;
            background: rgba(15, 23, 42, 0.8);
        }
        .input-group .btn:focus {
            box-shadow: none;
            background: rgba(15, 23, 42, 0.8) !important;
        }
        .input-group {
            border-radius: 12px;
        }
        .input-group .form-control {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }
        .input-group .btn {
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }
        
        /* Mobile Specific padding adjustments */
        @media (max-width: 576px) {
            .auth-card {
                padding: 30px 20px;
                border-radius: 20px;
            }
            .container {
                padding-left: 15px;
                padding-right: 15px;
            }
        }
    </style>
</body>
</html>
